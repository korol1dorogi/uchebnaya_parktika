apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: praktika
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: praktika
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  strategy:
    type: Recreate          # один том ReadWriteOnce — не запускаем 2 пода сразу
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef: { name: praktika-config, key: POSTGRES_DB }
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef: { name: praktika-config, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: praktika-secrets, key: DB_PASSWORD }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "praktika", "-d", "praktika"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "praktika", "-d", "praktika"]
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-pvc
        - name: initdb
          configMap:
            name: db-init        # создаётся из db/init.sql (см. k8s/README.md)
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: praktika
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
