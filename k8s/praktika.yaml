apiVersion: apps/v1
kind: Deployment
metadata:
  name: praktika
  namespace: praktika
spec:
  replicas: 1
  selector:
    matchLabels:
      app: praktika
  template:
    metadata:
      labels:
        app: praktika
    spec:
      # Ждём готовности БД, т.к. в k8s нет depends_on.
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - "until pg_isready -h db -U praktika; do echo 'ждём db...'; sleep 2; done"
      containers:
        - name: praktika
          image: praktika:latest
          imagePullPolicy: IfNotPresent
          tty: true                 # построчный stdout -> логи видны в kubectl logs
          ports:
            - containerPort: 8081
          # requests обязательны для HPA (он считает % загрузки от request).
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          envFrom:
            - configMapRef:
                name: praktika-config
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef: { name: praktika-secrets, key: GROQ_API_KEY }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: praktika-secrets, key: DB_PASSWORD }
          readinessProbe:
            httpGet: { path: /api/health, port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8081 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: praktika
  namespace: praktika
spec:
  type: NodePort
  selector:
    app: praktika
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
