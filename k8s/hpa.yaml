# HorizontalPodAutoscaler: автоматически меняет число реплик praktika
# по средней загрузке CPU. Требует metrics-server и resource requests

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: praktika
  namespace: praktika
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: praktika
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50      # цель: ~50% от request (100m -> порог 50m)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0   # быстро вверх
    scaleDown:
      stabilizationWindowSeconds: 30  # вниз с задержкой 30с (по умолчанию 300с)
