# ШАБЛОН. Реальный Secret в git НЕ коммитим — создаём из .env командой:
#   kubectl -n praktika create secret generic praktika-secrets --from-env-file=.env
#
# Этот файл показывает лишь структуру (значения-плейсхолдеры).
apiVersion: v1
kind: Secret
metadata:
  name: praktika-secrets
  namespace: praktika
type: Opaque
stringData:
  GROQ_API_KEY: "gsk_..."
  DB_PASSWORD: "..."
